merge_protections:
  # Migrated from post_check rule 'Require approval from UHS maintainers'. Dropped options with no equivalent: title
  - name: Require approval from UHS maintainers
    if:
      - "#approved-reviews-by>=1"
    success_conditions:
      - or:
          - "#approved-reviews-by>=2"
          - and:
              - "#approved-reviews-by>=1"
              - "author~=^(dave[-]gantenbein|dejanzele|richscott|nikola[-]jokic|sudiptob2|dcoric|fabiovincenzi|pavlovic[-]ivan)"
